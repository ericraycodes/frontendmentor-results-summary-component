<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- displays site properly based on user's device -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- description -->
    <meta
      name="description"
      content="This is a solution for FrontenMentor's challenge task of Results summary component."
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <!-- preload woff2 fonts -->
    <link
      rel="preload"
      href="./assets/fonts/HankenGrotesk-VariableFont_wght.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="./assets/fonts/static/HankenGrotesk-Medium.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="./assets/fonts/static/HankenGrotesk-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="./assets/fonts/static/HankenGrotesk-ExtraBold.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <title>Frontend Mentor | Results summary component</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- RESULT-SUMMARY CARD -->
    <main class="result-summary-card">
      <!-- Result Component -->
      <section class="component result">
        <h2>Your Result</h2>
        <output class="output-circle">
          <data value="76">76</data>
          <p>of 100</p>
        </output>
        <div class="result-analysis-container">
          <strong>Great</strong>
          <p>
            You scored higher than <data value="0.65">65%</data> of the people
            who have taken these tests.
          </p>
        </div>
      </section>
      <!-- Summary Component -->
      <section class="component summary">
        <h2>Summary</h2>
        <ul class="summary-list">
          <li class="list-item reaction">
            <label for="Reaction" class="summary-label"
              ><img
                src="./assets/images/icon-reaction.svg"
                alt="A lightning bolt icon."
              />
              <p>Reaction</p></label
            >
            <output id="Reaction" class="summary-output"
              ><data value="80">80</data><span>/ 100</span></output
            >
          </li>
          <li class="list-item memory">
            <label for="Memory" class="summary-label"
              ><img src="./assets/images/icon-memory.svg" alt="A brain icon." />
              <p>Memory</p></label
            >
            <output id="Memory" class="summary-output"
              ><data value="80">92</data><span>/ 100</span></output
            >
          </li>
          <li class="list-item verbal">
            <label for="Verbal" class="summary-label">
              <img src="./assets/images/icon-verbal.svg" alt="A bubble icon." />
              <p>Verbal</p></label
            >
            <output id="Verbal" class="summary-output"
              ><data value="80">61</data><span>/ 100</span></output
            >
          </li>
          <li class="list-item visual">
            <label for="Visual" class="summary-label">
              <img src="./assets/images/icon-visual.svg" alt="An eye icon." />
              <p>Visual</p></label
            >
            <output id="Visual" class="summary-output"
              ><data value="80">73</data><span>/ 100</span></output
            >
          </li>
        </ul>
        <button class="button">Continue</button>
      </section>
    </main>

    <!-- FOOTER: added by frontendmentor -->
    <footer class="attribution">
      Challenge by
      <a
        target="_blank"
        href="https://www.frontendmentor.io/challenges/results-summary-component-CE_K6s0maV"
      >
        Frontend Mentor</a
      >. Coded by
      <a
        target="_blank"
        href="https://github.com/ericraycodes/frontendmentor-results-summary-component"
      >
        Eric Ray Saladar</a
      >.
    </footer>
  </body>
</html>
